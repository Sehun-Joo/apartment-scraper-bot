name: Hourly Apartment Scraper

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Allow manual execution from the GitHub Actions tab

permissions:
  contents: write

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Scraper Bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          node scraper.js

      - name: Commit and Push Database Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Only add and commit if seen_listings.json has changed
          git add seen_listings.json
          if git diff --cached --quiet; then
            echo "No changes in seen_listings.json. Database is up to date."
          else
            echo "Database updated. Committing and pushing changes..."
            git commit -m "chore: update seen listings database [skip ci]"
            git push
          fi
